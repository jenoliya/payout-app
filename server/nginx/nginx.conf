
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # proxy buffering tune (optional)
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;

    # Upstreams (point to service names in compose)
    upstream frontend_upstream {
        # container and internal port
        server 172.17.0.1:4173;
    }

    upstream backend_upstream {
        server 172.17.0.1:8000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # serve root URLs to frontend
        location / {
            # If frontend serves static assets directly, try file first.
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_redirect off;
        }

        # route /api/ to backend
        location /api/ {
            # Strip nothing: send /api/foo as /api/foo to backend. If your backend expects /foo,
            # use `proxy_pass http://backend_upstream/;` with trailing slash to drop /api prefix.
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_redirect off;
        }

        # Recommended security headers (simple set)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }
}
