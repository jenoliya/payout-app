services:
  postgres:
    image: postgres:16-alpine
    container_name: payout_app_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=payout_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: payout_app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payout_app_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_WORKERS=2
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/v1/auth/login/ | grep -qE '^[2-5]'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payout_app_celery_worker
    restart: unless-stopped
    command: celery -A core worker --loglevel=info
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=postgres
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payout_app_celery_beat
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_ENABLED=True
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=postgres
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

volumes:
  pg_data:

networks:
  app-network:
    driver: bridge